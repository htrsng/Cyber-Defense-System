version: '3.9'

services:
  mongodb:
    image: mongo:7.0
    container_name: cyberdef_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret123
      MONGO_INITDB_DATABASE: cyberdefense
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - cyberdef_net

  redis:
    image: redis:7.2-alpine
    container_name: cyberdef_redis
    restart: unless-stopped
    command: redis-server --requirepass redis123 --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cyberdef_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cyberdef_backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://admin:secret123@mongodb:27017/cyberdefense?authSource=admin
      REDIS_URL: redis://:redis123@redis:6379
      JWT_SECRET: super_secret_jwt_key_change_in_prod
      JWT_EXPIRES_IN: 7d
      PAYGUARD_SECURITY_MODE: unprotected
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 100
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - mongodb
      - redis
    networks:
      - cyberdef_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=http://localhost:5000
    container_name: cyberdef_frontend
    restart: unless-stopped
    environment:
      - REACT_APP_API_URL=http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - cyberdef_net

  payguard:
    build:
      context: ./payguard
      dockerfile: Dockerfile
    container_name: cyberdef_payguard
    ports:
      - "4000:4000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
      - PORT=4000
    depends_on:
      - backend
    networks:
      - cyberdef_net

volumes:
  mongo_data:
  redis_data:

networks:
  cyberdef_net:
    driver: bridge
